name: Tracewell Keeper

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-feed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keeper
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run keeper
        run: bun run updateFeed.ts
        env:
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          TRACEWELL_API_URL: https://tracewell-zeta.vercel.app
          ORACLE_FEED_ADDRESS: "0xcF2670404434E2470eE84a44C4cc0a449686Fe90"
          RITUAL_RPC_URL: https://rpc.ritualfoundation.org
          CHAIN_ID: 1979
